[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/admin.com"
  to = "/admin"
  status = 301
  force = true

[[redirects]]
  from = "/admin.com.html"
  to = "/admin"
  status = 301
  force = true

[[redirects]]
  from = "/studio-admin-9k4m2x.html"
  to = "/admin"
  status = 302
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "https://www.avremikolton.com/*"
  to = "https://avremikolton.com/:splat"
  status = 301
  force = true
