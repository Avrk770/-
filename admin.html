<!DOCTYPE html>
<html dir="rtl" lang="he">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול גלריה | Avremi Kolton</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0059b5",
              surface: "#f9f9fb",
              "surface-container-low": "#f3f3f5",
              "on-surface": "#1a1c1d",
              "on-surface-variant": "#414753",
              outline: "#717785",
              "outline-variant": "#c1c6d6"
            },
            fontFamily: {
              body: ["FbBooster", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      @font-face {
        font-family: "FbBooster";
        src: url("./assets/fonts/FbBooster-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "FbBooster";
        src: url("./assets/fonts/FbBooster-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: "FbBooster", sans-serif;
        font-weight: 400;
      }

      .text-xs,
      .text-sm,
      .text-base,
      .text-lg {
        font-weight: 400 !important;
      }

      .text-xl,
      .text-2xl,
      .text-3xl,
      .text-4xl,
      .text-5xl,
      .text-6xl,
      .text-7xl,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: 700 !important;
      }

      .gallery-card.dragging {
        opacity: 0.6;
        transform: scale(0.98);
      }

      .gallery-card.drag-over {
        outline: 2px dashed #0059b5;
        outline-offset: 4px;
      }
    </style>
  </head>

  <body class="bg-surface text-on-surface font-body min-h-screen">
    <header class="border-b border-outline-variant bg-white/80 backdrop-blur">
      <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div>
          <p class="text-sm text-on-surface-variant">CMS</p>
          <h1 class="text-xl font-extrabold tracking-tight">ניהול מדיה לגלריה</h1>
        </div>

        <div class="flex items-center gap-3">
          <a href="./index.html" class="text-sm text-on-surface-variant hover:text-primary">צפייה באתר</a>
          <button
            id="sign-out"
            type="button"
            class="rounded-lg border border-outline-variant px-4 py-2 text-sm hover:bg-white"
          >
            התנתק
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-4 py-4 space-y-4">
      <div id="setup-state" class="hidden rounded-xl border border-amber-200 bg-amber-50 text-amber-800 px-4 py-3 text-sm"></div>

      <div id="feedback" class="hidden"></div>

      <section id="auth-state" class="rounded-2xl border border-outline-variant bg-white p-6 max-w-xl">
        <h2 class="text-xl font-semibold mb-4">כניסה לניהול</h2>

        <form id="login-form" class="space-y-4">
          <label class="block">
            <span class="text-sm text-on-surface-variant">אימייל</span>
            <input
              name="email"
              type="email"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
            >
          </label>

          <label class="block">
            <span class="text-sm text-on-surface-variant">סיסמה</span>
            <input
              name="password"
              type="password"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
            >
          </label>

          <button type="submit" class="rounded-lg bg-primary text-white px-5 py-2.5 text-sm font-medium">התחבר</button>
        </form>
      </section>

      <section id="dashboard-state" class="hidden grid grid-cols-1 xl:grid-cols-[300px_minmax(0,1fr)] gap-4 items-start">
        <article class="rounded-2xl border border-outline-variant bg-white p-4 xl:sticky xl:top-4">
          <h2 class="text-lg font-semibold mb-4">העלאה</h2>

          <form id="upload-form" class="space-y-3">
            <p class="text-xs text-on-surface-variant">1. בחר קבצים 2. העלה אותם לגלריה</p>
            <div class="flex flex-col gap-2">
              <label
                for="image_file"
                class="inline-flex items-center justify-center rounded-xl bg-slate-900 text-white px-4 py-2.5 text-sm cursor-pointer hover:bg-slate-800 transition-colors"
              >
                בחירת קבצים
              </label>
              <input id="image_file" name="image_file" type="file" accept="image/*" multiple required class="hidden">
              <span id="selected-file-name" class="text-sm text-on-surface-variant">לא נבחרו קבצים עדיין</span>
            </div>

            <label class="inline-flex items-center gap-2">
              <input name="is_published" type="checkbox" checked class="h-4 w-4">
              <span class="text-sm text-on-surface-variant">לפרסם מיד באתר</span>
            </label>

            <div>
              <button
                id="upload-submit"
                type="submit"
                class="w-full inline-flex items-center justify-center gap-2 rounded-xl bg-primary text-white px-4 py-2.5 text-sm shadow-lg shadow-primary/25 hover:opacity-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                disabled
              >
                התחל העלאה
              </button>
            </div>

            <div id="upload-progress-wrap" class="hidden space-y-1.5">
              <div class="h-2 w-full rounded-full bg-slate-200 overflow-hidden">
                <div
                  id="upload-progress-bar"
                  class="h-full w-0 bg-primary transition-all duration-300"
                ></div>
              </div>
              <div class="flex items-center justify-between text-xs text-on-surface-variant">
                <span id="upload-progress-text">0%</span>
                <span id="upload-progress-detail"></span>
              </div>
            </div>
          </form>
        </article>

        <article class="rounded-2xl border border-outline-variant bg-white p-4 space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold">תמונות בגלריה</h2>
            <button id="refresh-items" type="button" class="rounded-lg border border-outline-variant px-4 py-2 text-sm">רענן</button>
          </div>

          <div class="flex flex-wrap items-center gap-2 rounded-xl border border-outline-variant bg-surface-container-low p-2.5">
            <span id="selected-count" class="text-sm text-on-surface-variant">0 נבחרו</span>
            <button id="select-all-active" type="button" class="rounded-lg border border-outline-variant px-3 py-1.5 text-xs">בחר הכל פעילים</button>
            <button id="select-all-hidden" type="button" class="rounded-lg border border-outline-variant px-3 py-1.5 text-xs">בחר הכל מוסתרים</button>
            <button id="clear-selection" type="button" class="rounded-lg border border-outline-variant px-3 py-1.5 text-xs">נקה בחירה</button>
            <button id="delete-selected" type="button" class="rounded-lg bg-red-600 text-white px-3 py-1.5 text-xs disabled:opacity-50" disabled>מחק נבחרות</button>
          </div>

          <section class="space-y-3">
            <div class="flex items-center justify-between">
              <h3 class="text-base font-semibold">תמונות פעילות באתר</h3>
              <span id="items-count-active" class="text-xs text-on-surface-variant">0</span>
            </div>
            <p class="text-xs text-on-surface-variant">אפשר לגרור תמונות פעילות כדי לשנות סדר הופעה באתר.</p>
            <div id="items-grid-active" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3"></div>
          </section>

          <section class="space-y-3">
            <div class="flex items-center justify-between">
              <h3 class="text-base font-semibold">תמונות לא פעילות</h3>
              <span id="items-count-hidden" class="text-xs text-on-surface-variant">0</span>
            </div>
            <div id="items-grid-hidden" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3"></div>
          </section>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app-config.js"></script>
    <script src="./assets/admin.js"></script>
  </body>
</html>
