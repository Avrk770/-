<!DOCTYPE html>
<html class="light" dir="rtl" lang="he">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול גלריה | Avremi Kolton</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0059b5",
              surface: "#f9f9fb",
              "surface-container-low": "#f3f3f5",
              "on-surface": "#1a1c1d",
              "on-surface-variant": "#414753",
              outline: "#717785",
              "outline-variant": "#c1c6d6"
            },
            fontFamily: {
              body: ["Ploni", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      @font-face {
        font-family: "Ploni";
        src: url("./assets/fonts/Ploni-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Ploni";
        src: url("./assets/fonts/Ploni-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: "Ploni", sans-serif;
        font-weight: 400;
      }

      .text-xs,
      .text-sm,
      .text-base,
      .text-lg {
        font-weight: 400 !important;
      }

      .text-xl,
      .text-2xl,
      .text-3xl,
      .text-4xl,
      .text-5xl,
      .text-6xl,
      .text-7xl,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: 700 !important;
      }

      .dashboard-animate-in {
        animation: dashboardFadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .dashboard-animate-in-delayed {
        animation: dashboardFadeIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        animation-delay: 0.08s;
      }

      .gallery-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        animation: cardFadeIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .gallery-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 32px -18px rgba(0, 0, 0, 0.45);
      }

      button,
      a {
        transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.25s ease, background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      }

      button:active,
      a:active {
        transform: scale(0.98);
      }

      .upload-dropzone {
        border: 1.5px dashed rgba(113, 119, 133, 0.7);
        background: rgba(255, 255, 255, 0.7);
        transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease;
      }

      .dark .upload-dropzone {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.04);
      }

      .upload-dropzone:hover {
        transform: translateY(-1px);
        border-color: #0059b5;
      }

      .upload-dropzone.has-files {
        border-style: solid;
        border-color: #0059b5;
        background: rgba(0, 89, 181, 0.08);
      }

      .upload-dropzone.drag-active {
        transform: translateY(-2px);
        border-style: solid;
        border-color: #0071e3;
        background: rgba(0, 113, 227, 0.14);
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
      }

      .dark .upload-dropzone.has-files {
        background: rgba(0, 113, 227, 0.16);
      }

      .dark .upload-dropzone.drag-active {
        background: rgba(0, 113, 227, 0.2);
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.3);
      }

      #upload-modal {
        transition: opacity 0.25s ease;
      }

      #upload-modal-panel {
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
      }

      #upload-modal.modal-open {
        opacity: 1;
        pointer-events: auto;
      }

      #upload-modal.modal-open #upload-modal-panel {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      @keyframes dashboardFadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes cardFadeIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      body,
      header,
      section,
      article,
      div,
      input,
      button {
        transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      }
    </style>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("admin-color-theme");
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (savedTheme === "light") {
          document.documentElement.classList.remove("dark");
        } else if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

  <body class="bg-surface dark:bg-[#121212] text-on-surface dark:text-[#f0f0f2] font-body min-h-screen selection:bg-primary/10">
    <header class="sticky top-0 z-40 border-b border-black/[0.05] dark:border-white/[0.08] bg-white/70 dark:bg-[#121212]/70 backdrop-blur-2xl">
      <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
        <div>
          <p class="text-sm text-on-surface-variant dark:text-white/60">CMS</p>
          <h1 class="text-xl font-extrabold tracking-tight">ניהול מדיה לגלריה</h1>
        </div>

        <div class="flex items-center gap-3">
          <button
            id="theme-toggle"
            type="button"
            class="rounded-lg border border-outline-variant dark:border-white/15 px-3 py-2 text-sm hover:bg-surface-container-low dark:hover:bg-white/10"
          >
            מצב כהה
          </button>
          <a href="./index.html" target="_blank" rel="noopener noreferrer" class="text-sm text-on-surface-variant dark:text-white/70 hover:text-primary">צפייה באתר</a>
          <button
            id="sign-out"
            type="button"
            class="rounded-lg border border-outline-variant dark:border-white/15 px-4 py-2 text-sm hover:bg-white dark:hover:bg-white/10"
          >
            התנתק
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-screen-2xl mx-auto px-4 py-4 space-y-4">
      <div id="setup-state" class="hidden rounded-xl border border-amber-200 bg-amber-50 text-amber-800 px-4 py-3 text-sm dark:bg-amber-900/30 dark:border-amber-500/40 dark:text-amber-200"></div>

      <div id="feedback" class="hidden"></div>

      <section id="auth-state" class="dashboard-animate-in rounded-2xl border border-outline-variant dark:border-white/10 bg-white dark:bg-white/5 p-6 max-w-xl">
        <h2 class="text-xl font-semibold mb-4">כניסה לניהול</h2>

        <form id="login-form" class="space-y-4">
          <label class="block">
            <span class="text-sm text-on-surface-variant dark:text-white/70">אימייל</span>
            <input
              name="email"
              type="email"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant dark:border-white/15 bg-white dark:bg-white/5 px-3 py-2"
            >
          </label>

          <label class="block">
            <span class="text-sm text-on-surface-variant dark:text-white/70">סיסמה</span>
            <input
              name="password"
              type="password"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant dark:border-white/15 bg-white dark:bg-white/5 px-3 py-2"
            >
          </label>

          <button type="submit" class="rounded-lg bg-primary text-white px-5 py-2.5 text-sm font-medium">התחבר</button>
        </form>
      </section>

      <section id="dashboard-state" class="hidden space-y-4">
        <article class="dashboard-animate-in rounded-2xl border border-outline-variant dark:border-white/10 bg-white dark:bg-white/5 p-4 space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <h2 class="text-lg font-semibold">תמונות בגלריה</h2>
            <div class="flex flex-wrap items-center gap-2">
              <button id="upload-open" type="button" class="rounded-lg bg-primary text-white px-4 py-2 text-sm">העלה תמונות</button>
              <button id="edit-toggle" type="button" class="rounded-lg border border-outline-variant dark:border-white/15 px-4 py-2 text-sm hover:bg-surface-container-low dark:hover:bg-white/10">מצב עריכה</button>
              <button id="refresh-items" type="button" class="rounded-lg border border-outline-variant dark:border-white/15 px-4 py-2 text-sm hover:bg-surface-container-low dark:hover:bg-white/10">רענן</button>
            </div>
          </div>

          <div id="selection-actions" class="hidden flex flex-wrap items-center gap-2 rounded-xl border border-outline-variant dark:border-white/10 bg-surface-container-low dark:bg-white/5 p-2.5">
            <span id="selected-count" class="text-sm text-on-surface-variant dark:text-white/70">0 נבחרו</span>
            <button id="select-all-active" type="button" class="rounded-lg border border-outline-variant dark:border-white/15 px-3 py-1.5 text-xs hover:bg-white dark:hover:bg-white/10">בחר הכל פעילים</button>
            <button id="select-all-hidden" type="button" class="rounded-lg border border-outline-variant dark:border-white/15 px-3 py-1.5 text-xs hover:bg-white dark:hover:bg-white/10">בחר הכל מוסתרים</button>
            <button id="clear-selection" type="button" class="rounded-lg border border-outline-variant dark:border-white/15 px-3 py-1.5 text-xs hover:bg-white dark:hover:bg-white/10">נקה בחירה</button>
            <button id="delete-selected" type="button" class="rounded-lg bg-red-600 text-white px-3 py-1.5 text-xs disabled:opacity-50" disabled>מחק נבחרות</button>
          </div>

          <section class="space-y-3">
            <div class="flex items-center justify-between">
              <h3 class="text-base font-semibold">תמונות פעילות באתר</h3>
              <span id="items-count-active" class="text-xs text-on-surface-variant dark:text-white/60">0</span>
            </div>
            <p class="text-xs text-on-surface-variant dark:text-white/60">במצב עריכה אפשר לשנות סדר עם כפתורי למעלה/למטה על כל תמונה פעילה.</p>
            <div id="items-grid-active" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3"></div>
          </section>

          <section class="space-y-3">
            <button id="hidden-toggle" type="button" class="w-full flex items-center justify-between rounded-lg border border-outline-variant dark:border-white/15 px-3 py-2 hover:bg-surface-container-low dark:hover:bg-white/10">
              <span class="text-base font-semibold">תמונות לא פעילות</span>
              <span class="flex items-center gap-2">
                <span id="items-count-hidden" class="text-xs text-on-surface-variant dark:text-white/60">0</span>
                <span id="hidden-toggle-icon" class="text-xs">+</span>
              </span>
            </button>
            <div id="hidden-section-body" class="hidden">
              <div id="items-grid-hidden" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3"></div>
            </div>
          </section>
        </article>
      </section>

      <div id="upload-modal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm p-4 opacity-0 pointer-events-none">
        <div id="upload-modal-panel" class="max-w-xl mx-auto bg-white dark:bg-[#121212] rounded-2xl border border-outline-variant dark:border-white/10 p-5 mt-20 shadow-xl shadow-black/20 opacity-0 translate-y-3 scale-[0.98]">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">העלאת תמונות</h3>
            <button id="upload-close" type="button" class="rounded-lg border border-outline-variant dark:border-white/15 px-3 py-1.5 text-sm hover:bg-surface-container-low dark:hover:bg-white/10">סגור</button>
          </div>

          <form id="upload-form" class="space-y-3">
            <p class="text-xs text-on-surface-variant dark:text-white/60">1. בחר קבצים 2. העלה אותם לגלריה</p>
            <div class="flex flex-col gap-2">
              <label
                id="upload-dropzone"
                for="image_file"
                class="upload-dropzone inline-flex flex-col items-center justify-center rounded-xl px-4 py-5 text-sm cursor-pointer"
              >
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-6 h-6 mb-2 opacity-80" fill="currentColor" aria-hidden="true">
                  <path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.29a1 1 0 1 1 1.4 1.41l-4 3.99a1 1 0 0 1-1.4 0l-4-3.99a1 1 0 0 1 1.4-1.41L11 12.59V4a1 1 0 0 1 1-1zM5 19a1 1 0 0 0 0 2h14a1 1 0 1 0 0-2H5z"/>
                </svg>
                <span class="font-medium">בחר קבצים להעלאה</span>
                <span class="text-xs text-on-surface-variant dark:text-white/60 mt-1">אפשר לבחור כמה תמונות ביחד</span>
              </label>
              <input id="image_file" name="image_file" type="file" accept="image/*" multiple required class="hidden">
              <span id="selected-file-name" class="text-sm text-on-surface-variant dark:text-white/60">לא נבחרו קבצים עדיין</span>
            </div>

            <label class="inline-flex items-center gap-2">
              <input name="is_published" type="checkbox" checked class="h-4 w-4">
              <span class="text-sm text-on-surface-variant dark:text-white/70">לפרסם מיד באתר</span>
            </label>

            <div>
              <button
                id="upload-submit"
                type="submit"
                class="w-full inline-flex items-center justify-center gap-2 rounded-xl bg-primary text-white px-4 py-2.5 text-sm shadow-lg shadow-primary/25 hover:opacity-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                disabled
              >
                התחל העלאה
              </button>
            </div>

            <div id="upload-progress-wrap" class="hidden space-y-1.5">
              <div class="h-2 w-full rounded-full bg-slate-200 dark:bg-white/20 overflow-hidden">
                <div id="upload-progress-bar" class="h-full w-0 bg-primary transition-all duration-300"></div>
              </div>
              <div class="flex items-center justify-between text-xs text-on-surface-variant dark:text-white/60">
                <span id="upload-progress-text">0%</span>
                <span id="upload-progress-detail"></span>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app-config.js"></script>
    <script src="./assets/admin.js"></script>
    <script>
      (function () {
        const themeToggle = document.getElementById("theme-toggle");
        const root = document.documentElement;

        function updateThemeLabel() {
          if (!themeToggle) {
            return;
          }
          const isDark = root.classList.contains("dark");
          themeToggle.textContent = isDark ? "מצב בהיר" : "מצב כהה";
        }

        if (themeToggle) {
          updateThemeLabel();
          themeToggle.addEventListener("click", function () {
            root.classList.toggle("dark");
            localStorage.setItem("admin-color-theme", root.classList.contains("dark") ? "dark" : "light");
            updateThemeLabel();
          });
        }
      })();
    </script>
  </body>
</html>
