<!DOCTYPE html>
<html class="light" dir="rtl" lang="he">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avremi Kolton - תיק עבודות</title>
    <meta name="description" content="תיק עבודות חי עם גלריה דינמית וניהול מדיה.">

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    >

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#0071e3",
              "secondary-fixed-dim": "#c8c6c8",
              "inverse-primary": "#abc7ff",
              "on-tertiary-fixed": "#1a1b1f",
              "inverse-on-surface": "#f0f0f2",
              "outline-variant": "#c1c6d6",
              background: "#f9f9fb",
              "on-primary-fixed": "#001b3f",
              "on-error": "#ffffff",
              "tertiary-container": "#737378",
              "surface-bright": "#f9f9fb",
              tertiary: "#5a5b5f",
              "error-container": "#ffdad6",
              "surface-container-low": "#f3f3f5",
              "on-primary-fixed-variant": "#00458f",
              "secondary-container": "#e2dfe1",
              primary: "#0059b5",
              "surface-container-highest": "#e2e2e4",
              "on-tertiary-fixed-variant": "#46464b",
              "primary-fixed-dim": "#abc7ff",
              "secondary-fixed": "#e4e2e4",
              "inverse-surface": "#2f3132",
              "tertiary-fixed-dim": "#c7c6cb",
              "on-secondary-fixed": "#1b1b1d",
              surface: "#f9f9fb",
              "on-secondary-fixed-variant": "#474649",
              "on-secondary": "#ffffff",
              "on-surface": "#1a1c1d",
              "surface-container": "#eeeef0",
              "surface-tint": "#005cbb",
              "tertiary-fixed": "#e3e2e7",
              "on-primary-container": "#fcfbff",
              "primary-fixed": "#d7e2ff",
              "surface-dim": "#d9dadc",
              "on-tertiary": "#ffffff",
              "surface-variant": "#e2e2e4",
              "surface-container-high": "#e8e8ea",
              "on-tertiary-container": "#fcfaff",
              "on-background": "#1a1c1d",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-container": "#636264",
              error: "#ba1a1a",
              secondary: "#5f5e60",
              outline: "#717785",
              "on-primary": "#ffffff",
              "on-surface-variant": "#414753"
            },
            fontFamily: {
              headline: ["Ploni", "sans-serif"],
              body: ["Ploni", "sans-serif"],
              label: ["Ploni", "sans-serif"]
            },
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
          }
        }
      };
    </script>

    <style>
      @font-face {
        font-family: "Ploni";
        src: url("./assets/fonts/Ploni-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Ploni";
        src: url("./assets/fonts/Ploni-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Ploni", sans-serif;
        font-weight: 400;
      }

      img {
        -webkit-user-drag: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .text-xs,
      .text-sm,
      .text-base,
      .text-lg {
        font-weight: 400 !important;
      }

      .text-xl,
      .text-2xl,
      .text-3xl,
      .text-4xl,
      .text-5xl,
      .text-6xl,
      .text-7xl,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: 700 !important;
      }

      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }

      .masonry-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }

      @media (min-width: 1024px) {
        .masonry-grid {
          grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
          gap: 1.5rem;
        }
      }

      .masonry-item {
        break-inside: avoid;
        margin-bottom: 0;
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(2px);
        transition:
          opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
          filter 0.55s cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: opacity, transform, filter;
      }

      .masonry-item.reveal {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }

      .portfolio-card {
        transition:
          transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .portfolio-card:hover {
        transform: scale(1.05) translateY(-8px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      .dark .portfolio-card:hover {
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      }

      #lightbox-modal {
        transition: opacity 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .lightbox-panel {
        transform: translateY(10px) scale(0.985);
        opacity: 0;
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
      }

      #lightbox-modal.is-open .lightbox-panel {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .lightbox-control {
        opacity: 0;
        transform: translateY(-8px);
        transition: opacity 0.25s ease, transform 0.25s ease, color 0.2s ease;
      }

      #lightbox-modal.is-open .lightbox-control {
        opacity: 1;
        transform: translateY(0);
      }

      #lightbox-img {
        transition:
          transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.28s ease;
      }

      #lightbox-img.is-loading {
        opacity: 0;
        transform: scale(0.97);
      }

      #lightbox-img.is-ready {
        opacity: 1;
        transform: scale(1);
      }

      @media (prefers-reduced-motion: reduce) {
        .masonry-item,
        .portfolio-card,
        #lightbox-modal,
        .lightbox-panel,
        #lightbox-img,
        .lightbox-control {
          transition: none !important;
          animation: none !important;
        }
      }

      body,
      nav,
      footer,
      main,
      h1,
      span,
      a,
      button,
      p {
        transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
      }

      nav {
        background-color: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
      }

      .dark nav {
        background-color: rgba(18, 18, 18, 0.6);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
      }
    </style>

    <script>
      (function () {
        const savedTheme = localStorage.getItem("color-theme");
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>

  <body class="bg-surface dark:bg-[#121212] text-on-surface dark:text-[#f0f0f2] font-body selection:bg-primary/10">
    <nav class="fixed top-0 w-full z-50 border-b border-black/[0.05] dark:border-white/[0.08]">
      <div class="flex justify-between items-center w-full px-6 py-5 md:px-8 max-w-full mx-auto">
        <a class="text-[1.25rem] uppercase tracking-wide text-on-surface dark:text-white" style="font-weight: 400" href="/">Avremi Kolton</a>

        <div class="flex items-center gap-3 md:gap-6">
          <button
            aria-label="Toggle dark mode"
            id="theme-toggle"
            class="hidden md:flex p-2.5 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-on-surface-variant dark:text-white items-center justify-center"
          >
            <span id="theme-toggle-dark-icon" class="material-symbols-outlined">dark_mode</span>
            <span id="theme-toggle-light-icon" class="hidden material-symbols-outlined">light_mode</span>
          </button>

          <a
            id="whatsapp-link"
            href="https://wa.me/"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full font-medium tracking-tight text-white transition-all transform active:scale-95 shadow-lg"
            style="background-color: #25d366; box-shadow: 0 10px 24px rgba(37, 211, 102, 0.35)"
            onmouseover="this.style.backgroundColor='#1ebe5d'"
            onmouseout="this.style.backgroundColor='#25d366'"
            ><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-4 h-4 fill-current" aria-hidden="true">
              <path
                d="M19.11 17.35c-.28-.14-1.64-.81-1.9-.9-.25-.09-.43-.14-.61.14-.18.28-.7.9-.86 1.09-.16.18-.32.21-.6.07-.28-.14-1.19-.44-2.26-1.4-.84-.75-1.4-1.67-1.56-1.95-.16-.28-.02-.43.12-.57.12-.12.28-.32.42-.48.14-.16.18-.28.28-.46.09-.18.05-.35-.02-.49-.07-.14-.61-1.47-.84-2.02-.22-.53-.45-.46-.61-.47-.16-.01-.35-.01-.53-.01-.18 0-.49.07-.74.35-.25.28-.98.95-.98 2.31s1.01 2.69 1.15 2.88c.14.18 1.98 3.02 4.8 4.23.67.29 1.19.46 1.6.59.67.21 1.28.18 1.76.11.54-.08 1.64-.67 1.88-1.32.23-.65.23-1.21.16-1.32-.07-.11-.25-.18-.53-.32z"
              />
              <path
                d="M16.04 3.2c-7.04 0-12.75 5.71-12.75 12.75 0 2.24.58 4.35 1.6 6.18L3.2 28.8l6.86-1.64a12.7 12.7 0 0 0 5.98 1.51h.01c7.04 0 12.75-5.71 12.75-12.75S23.09 3.2 16.04 3.2zm0 23.26h-.01c-1.9 0-3.77-.51-5.39-1.47l-.39-.23-4.07.97.99-3.97-.25-.41a10.47 10.47 0 0 1-1.6-5.42c0-5.8 4.72-10.52 10.53-10.52 2.82 0 5.47 1.1 7.46 3.09a10.49 10.49 0 0 1 3.08 7.44c0 5.8-4.72 10.52-10.53 10.52z"
              />
            </svg>WhatsApp</a
          >
        </div>
      </div>
    </nav>

    <main class="pt-28 pb-24 px-3 sm:px-4 lg:px-12 max-w-[1920px] mx-auto">
      <div class="mb-8 md:mb-12">
        <p id="gallery-status" class="text-sm md:text-base text-on-surface-variant dark:text-white/60"></p>
      </div>

      <section id="masonry-grid" class="masonry-grid" aria-live="polite"></section>
    </main>

    <footer
      class="bg-surface-container-low dark:bg-[#121212] flex justify-center items-center w-full px-12 py-16 mt-12 md:mt-24 border-t border-black/[0.05] dark:border-white/10"
    >
      <div>
        <span class="text-lg lowercase text-on-surface dark:text-white tracking-normal" style="letter-spacing: 0.03em">avremi kolton</span>
      </div>
    </footer>

    <div
      id="lightbox-modal"
      class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-2xl opacity-0 hidden"
    >
      <button id="close-lightbox" class="lightbox-control absolute top-8 left-8 text-white hover:text-primary transition-colors p-2 z-[110]">
        <span class="material-symbols-outlined text-4xl">close</span>
      </button>

      <button
        id="prev-lightbox"
        class="lightbox-control absolute right-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors p-4 z-[110] md:block"
      >
        <span class="material-symbols-outlined text-5xl">chevron_right</span>
      </button>

      <button
        id="next-lightbox"
        class="lightbox-control absolute left-4 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors p-4 z-[110] md:block"
      >
        <span class="material-symbols-outlined text-5xl">chevron_left</span>
      </button>

      <div class="lightbox-panel max-w-5xl max-h-[90vh] p-4 relative flex items-center justify-center">
        <img
          id="lightbox-img"
          src=""
          alt="Enlarged view"
          class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl is-loading"
        >
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app-config.js"></script>
    <script src="./assets/gallery.js"></script>
  </body>
</html>
