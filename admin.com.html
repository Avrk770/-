<!DOCTYPE html>
<html dir="rtl" lang="he">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול גלריה | Avremi Kolton</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0059b5",
              surface: "#f9f9fb",
              "surface-container-low": "#f3f3f5",
              "on-surface": "#1a1c1d",
              "on-surface-variant": "#414753",
              outline: "#717785",
              "outline-variant": "#c1c6d6"
            },
            fontFamily: {
              body: ["FUP Galil", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      @font-face {
        font-family: "FUP Galil";
        src: url("./assets/fonts/FUP-Galil-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "FUP Galil";
        src: url("./assets/fonts/FUP-Galil-ExtraBold.otf") format("opentype");
        font-weight: 800;
        font-style: normal;
        font-display: swap;
      }

      body {
        font-family: "FUP Galil", sans-serif;
        font-weight: 400;
      }

      .text-xs,
      .text-sm,
      .text-base,
      .text-lg {
        font-weight: 400 !important;
      }

      .text-xl,
      .text-2xl,
      .text-3xl,
      .text-4xl,
      .text-5xl,
      .text-6xl,
      .text-7xl,
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-weight: 800 !important;
      }

      .gallery-card.dragging {
        opacity: 0.6;
        transform: scale(0.98);
      }

      .gallery-card.drag-over {
        outline: 2px dashed #0059b5;
        outline-offset: 4px;
      }
    </style>
  </head>

  <body class="bg-surface text-on-surface font-body min-h-screen">
    <header class="border-b border-outline-variant bg-white/80 backdrop-blur">
      <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div>
          <p class="text-sm text-on-surface-variant">CMS</p>
          <h1 class="text-2xl font-extrabold tracking-tight">ניהול מדיה לגלריה</h1>
        </div>

        <div class="flex items-center gap-3">
          <a href="./index.html" class="text-sm text-on-surface-variant hover:text-primary">צפייה באתר</a>
          <button
            id="sign-out"
            type="button"
            class="rounded-lg border border-outline-variant px-4 py-2 text-sm hover:bg-white"
          >
            התנתק
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">
      <div id="setup-state" class="hidden rounded-xl border border-amber-200 bg-amber-50 text-amber-800 px-4 py-3 text-sm"></div>

      <div id="feedback" class="hidden"></div>

      <section id="auth-state" class="rounded-2xl border border-outline-variant bg-white p-6 max-w-xl">
        <h2 class="text-xl font-semibold mb-4">כניסה לניהול</h2>

        <form id="login-form" class="space-y-4">
          <label class="block">
            <span class="text-sm text-on-surface-variant">אימייל</span>
            <input
              name="email"
              type="email"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
            >
          </label>

          <label class="block">
            <span class="text-sm text-on-surface-variant">סיסמה</span>
            <input
              name="password"
              type="password"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
            >
          </label>

          <button type="submit" class="rounded-lg bg-primary text-white px-5 py-2.5 text-sm font-medium">התחבר</button>
        </form>
      </section>

      <section id="dashboard-state" class="hidden space-y-6">
        <article class="rounded-2xl border border-outline-variant bg-white p-6">
          <h2 class="text-xl font-semibold mb-5">העלאת תמונה חדשה</h2>

          <form id="upload-form" class="space-y-4">
            <div class="flex flex-col md:flex-row md:items-center gap-3">
              <label
                for="image_file"
                class="inline-flex items-center justify-center rounded-xl bg-slate-900 text-white px-5 py-3 text-sm cursor-pointer hover:bg-slate-800 transition-colors"
              >
                בחר תמונה
              </label>
              <input id="image_file" name="image_file" type="file" accept="image/*" required class="hidden">
              <span id="selected-file-name" class="text-sm text-on-surface-variant">לא נבחר קובץ</span>
            </div>

            <label class="inline-flex items-center gap-2">
              <input name="is_published" type="checkbox" checked class="h-4 w-4">
              <span class="text-sm text-on-surface-variant">לפרסם מיד באתר</span>
            </label>

            <div>
              <button
                type="submit"
                class="inline-flex items-center gap-2 rounded-xl bg-primary text-white px-6 py-3 text-sm shadow-lg shadow-primary/25 hover:opacity-95 transition-all"
              >
                העלה תמונה
              </button>
            </div>
          </form>
        </article>

        <article class="rounded-2xl border border-outline-variant bg-white p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold">תמונות בגלריה</h2>
            <button id="refresh-items" type="button" class="rounded-lg border border-outline-variant px-4 py-2 text-sm">רענן</button>
          </div>
          <p class="text-sm text-on-surface-variant mb-4">אפשר לגרור תמונות כדי לשנות סדר הופעה באתר.</p>
          <div id="items-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app-config.js"></script>
    <script src="./assets/admin.js"></script>
  </body>
</html>
