<!DOCTYPE html>
<html dir="rtl" lang="he">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול גלריה | Avremi Kolton</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    >

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0059b5",
              surface: "#f9f9fb",
              "surface-container-low": "#f3f3f5",
              "on-surface": "#1a1c1d",
              "on-surface-variant": "#414753",
              outline: "#717785",
              "outline-variant": "#c1c6d6"
            },
            fontFamily: {
              body: ["Inter"]
            }
          }
        }
      };
    </script>
  </head>

  <body class="bg-surface text-on-surface font-body min-h-screen">
    <header class="border-b border-outline-variant bg-white/80 backdrop-blur">
      <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div>
          <p class="text-sm text-on-surface-variant">CMS</p>
          <h1 class="text-2xl font-extrabold tracking-tight">ניהול מדיה לגלריה</h1>
        </div>

        <div class="flex items-center gap-3">
          <a href="./index.html" class="text-sm text-on-surface-variant hover:text-primary">צפייה באתר</a>
          <button
            id="sign-out"
            type="button"
            class="rounded-lg border border-outline-variant px-4 py-2 text-sm hover:bg-white"
          >
            התנתק
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">
      <div id="setup-state" class="hidden rounded-xl border border-amber-200 bg-amber-50 text-amber-800 px-4 py-3 text-sm"></div>

      <div id="feedback" class="hidden"></div>

      <section id="auth-state" class="rounded-2xl border border-outline-variant bg-white p-6 max-w-xl">
        <h2 class="text-xl font-semibold mb-4">כניסה לניהול</h2>

        <form id="login-form" class="space-y-4">
          <label class="block">
            <span class="text-sm text-on-surface-variant">אימייל</span>
            <input
              name="email"
              type="email"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
            >
          </label>

          <label class="block">
            <span class="text-sm text-on-surface-variant">סיסמה</span>
            <input
              name="password"
              type="password"
              required
              class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
            >
          </label>

          <button type="submit" class="rounded-lg bg-primary text-white px-5 py-2.5 text-sm font-medium">התחבר</button>
        </form>
      </section>

      <section id="dashboard-state" class="hidden space-y-6">
        <article class="rounded-2xl border border-outline-variant bg-white p-6">
          <h2 class="text-xl font-semibold mb-4">העלאת פריט חדש</h2>

          <form id="upload-form" class="grid md:grid-cols-2 gap-4">
            <label class="block md:col-span-2">
              <span class="text-sm text-on-surface-variant">קובץ תמונה</span>
              <input
                name="image_file"
                type="file"
                accept="image/*"
                required
                class="mt-1 block w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
              >
            </label>

            <label class="block">
              <span class="text-sm text-on-surface-variant">כותרת</span>
              <input name="title" type="text" class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2">
            </label>

            <label class="block">
              <span class="text-sm text-on-surface-variant">Alt לטובת SEO ונגישות</span>
              <input
                name="alt_text"
                type="text"
                class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
              >
            </label>

            <label class="block">
              <span class="text-sm text-on-surface-variant">קטגוריה</span>
              <input
                name="category"
                type="text"
                class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
              >
            </label>

            <label class="block">
              <span class="text-sm text-on-surface-variant">סדר תצוגה</span>
              <input
                name="sort_order"
                type="number"
                value="1000"
                class="mt-1 w-full rounded-lg border border-outline-variant bg-white px-3 py-2"
              >
            </label>

            <label class="inline-flex items-center gap-2 md:col-span-2">
              <input name="is_published" type="checkbox" checked class="h-4 w-4">
              <span class="text-sm text-on-surface-variant">לפרסם מיד באתר</span>
            </label>

            <div class="md:col-span-2">
              <button type="submit" class="rounded-lg bg-primary text-white px-5 py-2.5 text-sm font-medium">העלה ושמור</button>
            </div>
          </form>
        </article>

        <article class="rounded-2xl border border-outline-variant bg-white p-6 overflow-x-auto">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold">פריטים קיימים</h2>
            <button id="refresh-items" type="button" class="rounded-lg border border-outline-variant px-4 py-2 text-sm">רענן</button>
          </div>

          <table class="w-full min-w-[920px] text-sm">
            <thead>
              <tr class="text-right border-b border-outline-variant">
                <th class="px-4 py-3 font-medium">תמונה</th>
                <th class="px-4 py-3 font-medium">כותרת</th>
                <th class="px-4 py-3 font-medium">Alt</th>
                <th class="px-4 py-3 font-medium">קטגוריה</th>
                <th class="px-4 py-3 font-medium">סדר</th>
                <th class="px-4 py-3 font-medium text-center">Published</th>
                <th class="px-4 py-3 font-medium">שמור</th>
                <th class="px-4 py-3 font-medium">מחק</th>
              </tr>
            </thead>
            <tbody id="items-table-body"></tbody>
          </table>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app-config.js"></script>
    <script src="./assets/admin.js"></script>
  </body>
</html>
