        const observerOptions = {
            threshold: 0.15,
            rootMargin: '0px 0px -100px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.masonry-item').forEach((item, i) => {
            // Calculate delay based on position for a staggered effect
            const delay = (i % 4) * 150;
            item.style.transitionDelay = `${delay}ms`;
            observer.observe(item);
        });

        function openLightbox(index) {
            currentIndex = index;
            modal.classList.remove('hidden');
            
            // Trigger animation
            setTimeout(() => {
                modal.classList.add('opacity-100');
                updateLightboxContent(true);
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }

        function updateLightboxContent(isInitial = false) {
            if (!isInitial) {
                lightboxImg.style.opacity = '0';
                lightboxImg.style.transform = 'scale(0.95)';
            }
            
            setTimeout(() => {
                lightboxImg.src = galleryImages[currentIndex].src;
                lightboxImg.onload = () => {
                    lightboxImg.style.opacity = '1';
                    lightboxImg.style.transform = 'scale(1)';
                };
            }, isInitial ? 50 : 200);
        }

        function closeLightbox() {
            modal.classList.remove('opacity-100');
            lightboxImg.style.transform = 'scale(0.9)';
            lightboxImg.style.opacity = '0';
            
            setTimeout(() => {
                modal.classList.add('hidden');
                lightboxImg.src = '';
            }, 400);
            document.body.style.overflow = '';
        }

        function showNext() {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            updateLightboxContent();
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            updateLightboxContent();
        }

        galleryImages.forEach((img, index) => {
            img.classList.add('cursor-zoom-in');
            img.addEventListener('click', () => openLightbox(index));
        });

        closeBtn.addEventListener('click', closeLightbox);
        nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
        prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });

        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target.closest('button') === closeBtn) {
                closeLightbox();
            }
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('hidden')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') showPrev(); 
            if (e.key === 'ArrowLeft') showNext();  
        });

        // Touch/Swipe Support
        let touchStartX = 0;
        let touchEndX = 0;
        modal.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        modal.addEventListener('touchend', (e) => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, {passive: true});

        function handleSwipe() {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) showNext();
            if (touchEndX > touchStartX + threshold) showPrev();
        }

        // Dark Mode Logic
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleLightIcon.classList.add('hidden');
                themeToggleDarkIcon.classList.remove('hidden');
            }
        }

        updateIcons();

        themeToggleBtn.addEventListener('click', function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
            updateIcons();
        });
    </script>
</body></html>
